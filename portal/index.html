<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitor Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-primary: #0A0E27;
      --bg-secondary: #111829;
      --bg-surface: #16213E;
      --bg-card: #1A2749;
      --border-light: #2A3A5C;
      --border-mid: #3A4A6C;
      --text-primary: #E8F0FE;
      --text-secondary: #9CA3BA;
      --text-tertiary: #6B7589;
      --accent-primary: #4A90E2;
      --accent-secondary: #00D4FF;
      --phl-color: #1D6FD8;
      --tara-color: #0FA87E;
      --heft-color: #E08C1A;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --font-display: 'Syne', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    
    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(74, 144, 226, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-light);
      padding: 20px 0;
      animation: slideDownIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideDownIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-content {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(74, 144, 226, 0.25);
    }

    .logo-text h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-left: auto;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--success);
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    }

    .scan-button {
      padding: 8px 16px;
      background: var(--accent-primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 16px rgba(74, 144, 226, 0.3);
    }

    .scan-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 144, 226, 0.4);
    }

    .scan-button:active {
      transform: translateY(0);
    }

    .scan-button.scanning {
      animation: spin 1.5s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px;
    }

    .competitor-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      border-bottom: 2px solid var(--border-light);
      padding-bottom: 0;
      overflow-x: auto;
      scroll-behavior: smooth;
      animation: slideRightIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
    }

    @keyframes slideRightIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .tab {
      padding: 16px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      white-space: nowrap;
      font-family: var(--font-body);
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      color: var(--text-primary);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-primary);
      animation: expandIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes expandIn {
      from {
        transform: scaleX(0);
        transform-origin: left;
      }
      to {
        transform: scaleX(1);
        transform-origin: left;
      }
    }

    .tab.phl { --color: var(--phl-color); }
    .tab.tara { --color: var(--tara-color); }
    .tab.heft { --color: var(--heft-color); }

    .tab.phl.active {
      color: var(--phl-color);
    }

    .tab.tara.active {
      color: var(--tara-color);
    }

    .tab.heft.active {
      color: var(--heft-color);
    }

    .tab.phl.active::after { background: var(--phl-color); }
    .tab.tara.active::after { background: var(--tara-color); }
    .tab.heft.active::after { background: var(--heft-color); }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease 0.2s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .update-count {
      font-size: 24px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .posts-grid {
      display: grid;
      gap: 20px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: slideInCard 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .post-card:nth-child(1) { animation-delay: 0.05s; }
    .post-card:nth-child(2) { animation-delay: 0.1s; }
    .post-card:nth-child(3) { animation-delay: 0.15s; }
    .post-card:nth-child(4) { animation-delay: 0.2s; }
    .post-card:nth-child(5) { animation-delay: 0.25s; }
    .post-card:nth-child(n+6) { animation-delay: 0.3s; }

    @keyframes slideInCard {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .post-card:hover::before {
      opacity: 1;
    }

    .post-card:hover {
      border-color: var(--border-mid);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(74, 144, 226, 0.15);
    }

    .post-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      border: 2px solid;
    }

    .avatar.phl {
      background: rgba(29, 111, 216, 0.15);
      border-color: var(--phl-color);
      color: var(--phl-color);
    }

    .avatar.tara {
      background: rgba(15, 168, 126, 0.15);
      border-color: var(--tara-color);
      color: var(--tara-color);
    }

    .avatar.heft {
      background: rgba(224, 140, 26, 0.15);
      border-color: var(--heft-color);
      color: var(--heft-color);
    }

    .post-info h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .post-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(74, 144, 226, 0.1);
      border: 1px solid var(--accent-primary);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent-primary);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-primary);
      border-radius: 50%;
    }

    .post-content {
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }

    .post-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .post-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .post-preview {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-height: 300px;
      overflow: hidden;
      position: relative;
    }

    .preview-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(transparent, var(--bg-card));
      pointer-events: none;
    }

    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
      position: relative;
      z-index: 2;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .btn:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: rgba(74, 144, 226, 0.1);
    }

    .btn-primary {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover {
      background: rgba(74, 144, 226, 0.9);
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
    }

    .external-link {
      font-size: 12px;
      color: var(--accent-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .external-link:hover {
      color: var(--accent-primary);
      transform: translateX(2px);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      animation: fadeIn 0.3s ease;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 10;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: 24px;
    }

    .linkedin-preview {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 20px;
      line-height: 1.8;
      color: var(--text-secondary);
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      animation: slideRightIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      font-weight: 600;
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(1, 1fr);
      }

      .header-content {
        padding: 0 20px;
        gap: 20px;
      }

      main {
        padding: 20px;
      }

      .section-title {
        font-size: 24px;
      }

      .modal-content {
        max-width: 90vw;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-mid);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-mid);
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo-section">
      <div class="logo-icon">📊</div>
      <div class="logo-text">
        <h1>Competitor Tracker</h1>
        <p>Real-Time Intelligence</p>
      </div>
    </div>
    <div class="header-controls">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>LIVE</span>
      </div>
      <button class="scan-button" onclick="triggerScan()">⟳ Scan Now</button>
    </div>
  </div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" style="color: var(--phl-color);" id="stat-phl">12</div>
      <div class="stat-label">PHL Updates</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color: var(--tara-color);" id="stat-tara">15</div>
      <div class="stat-label">Tarachand Updates</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color: var(--heft-color);" id="stat-heft">18</div>
      <div class="stat-label">HEFT Updates</div>
    </div>
  </div>

  <div class="competitor-tabs">
    <button class="tab phl active" onclick="switchTab('phl')">PHL Industries</button>
    <button class="tab tara" onclick="switchTab('tara')">Tarachand Group</button>
    <button class="tab heft" onclick="switchTab('heft')">HEFT Corp</button>
  </div>

  <div class="content-header">
    <div>
      <h2 class="section-title" id="section-title">PHL Industries</h2>
    </div>
    <div class="update-count" id="update-count">12 Updates</div>
  </div>

  <div class="posts-grid" id="posts-grid">
  </div>
</main>

<div class="modal" id="preview-modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">LinkedIn Post Preview</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="linkedin-preview" id="preview-content"></div>
    </div>
  </div>
</div>

let currentTab = 'phl';

function renderPosts() {
  const postsData = posts[currentTab];
  const grid = document.getElementById('posts-grid');
  
  grid.innerHTML = postsData.map((post, idx) => {
    const competitor = competitors[currentTab];
    return `
      <div class="post-card">
        <div class="post-header">
          <div class="post-meta">
            <div class="avatar ${competitor.class}">${competitor.initials}</div>
            <div class="post-info">
              <h3>${competitor.name}</h3>
              <div class="post-time">${post.timestamp}</div>
            </div>
          </div>
          <div class="post-badge">
            <div class="badge-dot"></div>
            ${post.category}
          </div>
        </div>
        <div class="post-content">
          <div class="post-title">${post.title}</div>
          <div class="post-summary">${post.summary}</div>
          <div class="post-preview">
            ${post.content.substring(0, 280)}...
            <div class="preview-fade"></div>
          </div>
        </div>
        <div class="post-footer">
          <a href="javascript:showPreview('${currentTab}', ${post.id})" class="btn btn-primary">View Full Post</a>
          <a href="${post.url}" target="_blank" rel="noopener noreferrer" class="external-link">Visit LinkedIn →</a>
        </div>
      </div>
    `;
  }).join('');
}

function switchTab(tab) {
  currentTab = tab;
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const competitor = competitors[tab];
  document.getElementById('section-title').textContent = competitor.name;
  document.getElementById('update-count').textContent = `${posts[tab].length} Updates`;
  
  renderPosts();
}

function showPreview(tab, postId) {
  const postsData = posts[tab];
  const post = postsData.find(p => p.id === postId);
  
  if (post) {
    document.getElementById('preview-content').textContent = post.content;
    document.getElementById('preview-modal').classList.add('active');
  }
}

function closeModal() {
  document.getElementById('preview-modal').classList.remove('active');
}

function triggerScan() {
  const btn = document.querySelector('.scan-button');
  btn.classList.add('scanning');
  
  setTimeout(() => {
    btn.classList.remove('scanning');
  }, 3000);
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  renderPosts();
  
  document.getElementById('stat-phl').textContent = posts.phl.length;
  document.getElementById('stat-tara').textContent = posts.tara.length;
  document.getElementById('stat-heft').textContent = posts.heft.length;
});

// Close modal on outside click
document.getElementById('preview-modal').addEventListener('click', (e) => {
  if (e.target.id === 'preview-modal') {
    closeModal();
  }
});
</script>
